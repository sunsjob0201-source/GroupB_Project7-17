spring.application.name=ShinGroupB_Project
spring.datasource.url=${SHOP_DB_URL:jdbc:postgresql://localhost:5432/groupb_project}
spring.datasource.username=${SHOP_DB_USER:postgres}
spring.datasource.password=${SHOP_DB_PASSWORD:psql}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp
server.servlet.session.timeout=30m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.error.include-message=always
